version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: shop-postgres-db

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

    ports:
      - "5432:5432"

    networks:
      - shop_network

    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: shop-mongo-db

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

    networks:
      - shop_network

    restart: unless-stopped

  sync:
    build: ./sync
    container_name: sync-service

    env_file:
      - .env

    depends_on:
      - postgres
      - mongo

    networks:
      - shop_network

    restart: unless-stopped

volumes:
  pg_data:
  mongo_data:

networks:
  shop_network:
    driver: bridge